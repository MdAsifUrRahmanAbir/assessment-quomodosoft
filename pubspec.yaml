name: assessment_quomodosoft
description: "Service management app - Assessment for Quomodosoft."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.3

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State Management
  flutter_bloc: ^9.1.1
  equatable: ^2.0.7

  # DI
  get_it: ^8.0.3

  # Network
  http: ^1.2.0

  # Functional programming / error handling
  dartz: ^0.10.1

  # UI
  google_fonts: ^6.2.1

  # Utils
  shared_preferences: ^2.5.3
  flutter_svg: ^2.3.0
  image_picker: ^1.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/icon/
    - assets/icon/dashboardBg.png
    - assets/icon/dashboardBg.svg
    - assets/icon/imageRectangle.svg
